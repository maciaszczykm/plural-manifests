apiVersion: apps/v1
kind: Deployment
metadata:
  name: replace-only-deployment
  annotations:
    deployment.plural.sh/sync-options: replace=true
spec:
  replicas: 2
  selector:
    matchLabels:
      app: replace-only
  template:
    metadata:
      labels:
        app: replace-only
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.0
          ports:
            - containerPort: 80