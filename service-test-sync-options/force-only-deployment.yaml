apiVersion: apps/v1
kind: Deployment
metadata:
  name: force-only-deployment
  annotations:
    # force=true uses SSA with force, taking ownership of fields managed by
    # another field manager (e.g. an HPA managing spec.replicas). Without
    # this, SSA would return a conflict error for any field owned by another
    # manager.
    deployment.plural.sh/sync-options: force=true
spec:
  replicas: 2
  selector:
    matchLabels:
      app: force-only
  template:
    metadata:
      labels:
        app: force-only
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.0
          ports:
            - containerPort: 80
