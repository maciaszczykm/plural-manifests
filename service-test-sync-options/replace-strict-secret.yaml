apiVersion: v1
kind: Secret
metadata:
  name: replace-strict-secret
  annotations:
    # replace=true uses PUT semantics, ensuring removed keys are deleted from
    # the live resource. Without this, SSA would leave previously-applied keys
    # in place even after they are removed from this manifest.
    deployment.plural.sh/sync-options: replace=true
type: Opaque
stringData:
  active-key: "value1"
  another-key: "value2"
